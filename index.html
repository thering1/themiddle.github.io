<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Middle</title>
    <link rel="icon" type="image/png" href="thethumb.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --banner-purple: #2e004f;
            --void-purple: #1a002e; /* Darker main background */
            --gold: #ffd700;
            --soft-white: #f4f4f4;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--void-purple); 
            color: var(--gold);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* Header & Bottom Banner */
        .banner { 
            background: var(--banner-purple); 
            padding: 25px; text-align: center; 
            border-bottom: 5px solid var(--gold);
            z-index: 100;
        }
        h1 { 
            margin: 0; 
            font-family: 'Permanent Marker', cursive; 
            font-size: 4rem; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #000;
        }

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        /* Left Side: Feed */
        #live-feed {
            width: 300px;
            background: rgba(0,0,0,0.4);
            border-right: 2px solid var(--gold);
            padding: 15px;
            font-size: 0.85rem;
            overflow-y: auto;
            color: var(--soft-white);
        }
        .feed-entry { margin-bottom: 12px; line-height: 1.4; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 5px; }

        /* Middle: Registry */
        .registry-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        #registry-list { 
            flex-grow: 1; overflow-y: auto; 
            padding: 20px 5%; scroll-behavior: smooth;
        }

        .search-area { padding: 20px; text-align: center; background: var(--void-purple); }
        #searchBar { 
            width: 70%; padding: 12px; 
            background: transparent; border: 2px solid var(--gold); 
            color: var(--gold); font-size: 1.2rem; outline: none;
            font-family: 'Bangers', cursive; letter-spacing: 1px;
        }

        /* Buttons & Interactions */
        .gold-btn { 
            background: var(--gold); color: var(--banner-purple); 
            border: none; padding: 12px 30px; font-weight: bold; 
            cursor: pointer; font-family: 'Permanent Marker', cursive;
            font-size: 1.1rem; transition: 0.2s;
        }
        .gold-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }

        .name-entry { border: 1px solid var(--gold); margin-bottom: 10px; background: rgba(0,0,0,0.3); }
        .name-header { padding: 15px; font-size: 1.6rem; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-family: 'Bangers', cursive; }
        .vengeance-sublist { display: none; padding: 20px; border-top: 1px solid var(--gold); }
        
        /* Auth Modal */
        #auth-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--banner-purple); border: 4px solid var(--gold); 
            padding: 30px; z-index: 3000; width: 450px; box-shadow: 20px 20px 0px #000;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: fixed; bottom: 20px; padding: 10px 20px;
            font-weight: bold; cursor: pointer; border: 2px solid var(--gold);
            background: var(--banner-purple); color: var(--gold); text-decoration: none; font-size: 0.8rem;
        }
        #btn-ring { left: 20px; }
        #btn-login { right: 20px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--void-purple); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>

    <div class="banner">
        <h1>The Middle</h1>
    </div>

    <div class="main-layout">
        <div id="live-feed">
            <h3 style="font-family: 'Bangers'; text-align: center; border-bottom: 2px solid var(--gold);">AUDIT LOG</h3>
            <div id="feed-content"></div>
        </div>

        <div class="registry-container">
            <div class="search-area">
                <input type="text" id="searchBar" placeholder="LOCATE TARGET..." oninput="window.filterNames()">
                <button class="gold-btn" onclick="window.toggleVWindow(true)">+ NEW VENGEANCE</button>
            </div>
            <div id="registry-list"></div>
        </div>
    </div>

    <a href="https://thering1.github.io/thering.github.io/" id="btn-ring" class="nav-btn">THE RING</a>
    <button id="btn-login" class="nav-btn" onclick="window.toggleAuth(true)">SIGN IN</button>

    <div id="v-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--banner-purple); border:4px solid var(--gold); padding:30px; z-index:2000; width:400px;">
        <h2 style="font-family:'Permanent Marker'">RECORD SIN</h2>
        <input type="text" id="vTarget" placeholder="TARGET NAME" class="input-box" style="width:90%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid var(--gold); color:white;" oninput="window.showSuggestions()">
        <div id="sugg-box" style="font-size:0.8rem; cursor:pointer; color:var(--soft-white); margin-bottom:10px;"></div>
        <textarea id="vSin" placeholder="SIN..." style="width:90%; background:transparent; border:1px solid var(--gold); color:white; padding:10px; margin-bottom:10px;"></textarea>
        <textarea id="vAction" placeholder="VENGEANCE..." style="width:90%; background:transparent; border:1px solid var(--gold); color:white; padding:10px; margin-bottom:10px;"></textarea>
        <button class="gold-btn" onclick="window.publishV()">PUBLISH</button>
        <button onclick="window.toggleVWindow(false)" style="color:var(--gold); background:none; border:none; cursor:pointer;">Cancel</button>
    </div>

    <div id="auth-modal">
        <div id="login-section">
            <h2 style="font-family:'Permanent Marker'">IDENTIFY</h2>
            <input type="text" id="authUser" placeholder="Username" style="width:90%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid var(--gold); color:white;">
            <input type="password" id="authPass" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid var(--gold); color:white;">
            <button class="gold-btn" onclick="window.login()">ENTER</button>
        </div>
        <div id="admin-section" style="display:none;">
            <h2 id="welcome-msg" style="font-family:'Bangers'"></h2>
            <div id="great-tools" style="display:none;">
                <button onclick="window.showUserMgmt()" class="gold-btn" style="font-size:0.7rem;">MANAGE SIBLINGS</button>
                <div id="user-list" style="margin-top:10px; font-size:0.7rem; border:1px solid var(--gold); max-height:150px; overflow-y:auto;"></div>
            </div>
            <button onclick="window.logout()" style="color:red; background:none; border:none; cursor:pointer; margin-top:20px;">LOGOUT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentSib = null;
        let registryData = {};

        // --- FEED LOGIC ---
        onValue(ref(db, 'middle_logs'), snap => {
            const feed = document.getElementById('feed-content');
            feed.innerHTML = "";
            const logs = [];
            snap.forEach(c => { logs.push(c.val()); });
            logs.reverse().forEach(l => {
                const div = document.createElement('div');
                div.className = 'feed-entry';
                div.innerHTML = `<b>${l.user}, ${l.rank} of the Middle:</b> ${l.action} against <b>${l.target}</b>.`;
                feed.appendChild(div);
            });
        });

        // --- REGISTRY SYNC ---
        onValue(ref(db, 'middle_registry'), snap => {
            registryData = snap.val() || {};
            render();
        });

        function render(filter = "") {
            const list = document.getElementById('registry-list');
            list.innerHTML = "";
            Object.keys(registryData).sort().forEach(name => {
                if (filter && !name.toLowerCase().includes(filter.toLowerCase())) return;
                const entry = document.createElement('div');
                entry.className = 'name-entry';
                entry.innerHTML = `<div class="name-header" onclick="window.toggleV('${name}')"><span>> ${name}</span></div>
                                   <div id="sub-${name.replace(/\s/g,'')}" class="vengeance-sublist"></div>`;
                list.appendChild(entry);
                const sub = entry.querySelector('.vengeance-sublist');
                Object.keys(registryData[name]).forEach(vId => {
                    const v = registryData[name][vId];
                    sub.innerHTML += `<div style="margin-bottom:15px; border-left:2px solid var(--gold); padding-left:10px;">
                        <div style="color:#ff4444">SIN: ${v.sin}</div>
                        <div>VENGEANCE: ${v.action}</div>
                        <button onclick="window.completeV('${name}','${vId}')" class="gold-btn" style="font-size:0.6rem; padding:5px; margin-top:5px;">COMPLETED VENGEANCE</button>
                    </div>`;
                });
            });
        }

        // --- ACTIONS ---
        window.publishV = async () => {
            const t = document.getElementById('vTarget').value.trim();
            const s = document.getElementById('vSin').value.trim();
            const a = document.getElementById('vAction').value.trim();
            if(!t || !s || !a) return;
            
            await push(ref(db, `middle_registry/${t}`), { sin: s, action: a });
            await push(ref(db, 'middle_logs'), {
                user: currentSib ? currentSib.display_name : "Anonymous",
                rank: currentSib ? currentSib.rank : "Stranger",
                action: "Added a vengeance",
                target: t
            });
            window.toggleVWindow(false);
        };

        window.completeV = async (name, vId) => {
            await remove(ref(db, `middle_registry/${name}/${vId}`));
            const check = await get(ref(db, `middle_registry/${name}`));
            if(!check.exists()) await remove(ref(db, `middle_registry/${name}`));
            
            await push(ref(db, 'middle_logs'), {
                user: currentSib ? currentSib.display_name : "Anonymous",
                rank: currentSib ? currentSib.rank : "Stranger",
                action: "Completed a vengeance",
                target: name
            });
        };

        // --- AUTH & SUBSYSTEMS ---
        window.login = async () => {
            const u = document.getElementById('authUser').value;
            const p = document.getElementById('authPass').value;
            const snap = await get(ref(db, `middle_users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                currentSib = snap.val();
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `${currentSib.display_name}, ${currentSib.rank}`;
                if(currentSib.rank.includes("Great")) document.getElementById('great-tools').style.display = 'block';
            } else alert("Access Denied.");
        };

        window.toggleAuth = (show) => document.getElementById('auth-modal').style.display = show ? 'block' : 'none';
        window.toggleVWindow = (show) => document.getElementById('v-modal').style.display = show ? 'block' : 'none';
        window.toggleV = (n) => { const s = document.getElementById(`sub-${n.replace(/\s/g,'')}`); s.style.display = s.style.display === 'block' ? 'none' : 'block'; };
        window.filterNames = () => render(document.getElementById('searchBar').value);
        window.logout = () => location.reload();
        window.showSuggestions = () => { /* Logic for autofill name suggestions */ };
    </script>
</body>
</html>
