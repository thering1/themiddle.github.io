<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Middle</title>
    <link rel="icon" type="image/png" href="thethumb.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --banner-purple: #2e004f;
            --void-purple: #1a002e; 
            --gold: #ffd700;
            --soft-white: #f4f4f4;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--void-purple); 
            color: var(--gold);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        .banner { 
            background: var(--banner-purple); 
            padding: 20px; text-align: center; 
            border-bottom: 5px solid var(--gold);
            z-index: 100;
        }

        /* Title uses the same font as Names/Audit Log */
        h1 { 
            margin: 0; 
            font-family: 'Bangers', cursive; 
            font-size: 4.5rem; 
            letter-spacing: 3px; 
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #000;
        }

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        /* Sidebar: Audit Log */
        #live-feed {
            width: 320px;
            background: rgba(0,0,0,0.5);
            border-right: 2px solid var(--gold);
            padding: 15px;
            font-size: 0.9rem;
            overflow-y: auto;
        }
        .feed-header { font-family: 'Bangers'; font-size: 1.8rem; text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 15px; }
        .feed-entry { margin-bottom: 12px; line-height: 1.4; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 8px; color: var(--soft-white); }

        /* Registry */
        .registry-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #registry-list { flex-grow: 1; overflow-y: auto; padding: 20px 5%; }
        .search-area { padding: 20px; text-align: center; }
        
        #searchBar { 
            width: 60%; padding: 12px; 
            background: transparent; border: 2px solid var(--gold); 
            color: var(--gold); font-size: 1.3rem; outline: none;
            font-family: 'Bangers', cursive;
        }

        /* Buttons */
        .gold-btn { 
            background: var(--gold); color: var(--banner-purple); 
            border: none; padding: 10px 25px; font-weight: bold; 
            cursor: pointer; font-family: 'Bangers', cursive; font-size: 1.2rem;
        }
        .nav-btn {
            position: fixed; bottom: 20px; padding: 10px 20px;
            font-weight: bold; cursor: pointer; border: 2px solid var(--gold);
            background: var(--banner-purple); color: var(--gold); 
            text-decoration: none; font-size: 0.9rem; font-family: 'Bangers';
        }

        /* Registry Items */
        .name-entry { border: 1px solid var(--gold); margin-bottom: 10px; background: rgba(0,0,0,0.2); }
        .name-header { padding: 15px; font-size: 1.8rem; cursor: pointer; font-family: 'Bangers', cursive; display: flex; justify-content: space-between; }
        .v-sublist { display: none; padding: 20px; border-top: 1px solid var(--gold); background: rgba(0,0,0,0.4); }

        /* Admin Modal */
        #auth-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--banner-purple); border: 4px solid var(--gold); 
            padding: 30px; z-index: 3000; width: 650px; max-height: 80vh; overflow-y: auto;
            box-shadow: 15px 15px 0px #000;
        }
        .admin-input { background: transparent; border: 1px solid var(--gold); color: white; padding: 8px; margin-bottom: 10px; width: 90%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 15px; }
        th, td { border: 1px solid var(--gold); padding: 5px; text-align: left; }
    </style>
</head>
<body>

    <div class="banner">
        <h1>The Middle</h1>
    </div>

    <div class="main-layout">
        <div id="live-feed">
            <div class="feed-header">AUDIT LOG</div>
            <div id="feed-content"></div>
        </div>

        <div class="registry-container">
            <div class="search-area">
                <input type="text" id="searchBar" placeholder="SEARCH REGISTRY..." oninput="window.filterNames()">
                <button class="gold-btn" onclick="window.toggleVEntry(true)">+ NEW VENGEANCE</button>
            </div>
            <div id="registry-list"></div>
        </div>
    </div>

    <a href="https://thering1.github.io/thering.github.io/" style="left:20px;" class="nav-btn">THE RING</a>
    <button id="auth-toggle-btn" style="right:20px;" class="nav-btn" onclick="window.handleAuthToggle()">SIGN IN</button>

    <div id="auth-modal">
        <div id="login-view">
            <h2 style="font-family:'Bangers'">IDENTIFY SIBLING</h2>
            <input type="text" id="uIn" placeholder="Username" class="admin-input"><br>
            <input type="password" id="pIn" placeholder="Password" class="admin-input"><br>
            <button class="gold-btn" onclick="window.login()">ENTER</button>
        </div>

        <div id="admin-view" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--gold); padding-bottom:10px;">
                <h2 id="sib-welcome" style="font-family:'Bangers'; margin:0;"></h2>
                <button onclick="window.logout()" style="color:red; background:none; border:none; cursor:pointer;">LOGOUT</button>
            </div>

            <div id="great-tools" style="display:none; margin-top:20px;">
                <h3 style="font-family:'Bangers'">SIBLING MANAGEMENT</h3>
                <div style="background:rgba(0,0,0,0.3); padding:10px; border:1px dashed var(--gold);">
                    <input type="text" id="regD" placeholder="Display Name" style="width:20%">
                    <input type="text" id="regU" placeholder="Username" style="width:20%">
                    <input type="text" id="regP" placeholder="Password" style="width:20%">
                    <input type="text" id="regR" placeholder="Rank" style="width:20%">
                    <button onclick="window.registerSib()" class="gold-btn" style="font-size:0.7rem;">CREATE</button>
                </div>
                <table>
                    <thead><tr><th>Display Name</th><th>Username</th><th>Password</th><th>Rank</th><th>Actions</th></tr></thead>
                    <tbody id="sib-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="v-entry-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--banner-purple); border:4px solid var(--gold); padding:30px; z-index:2500; width:400px;">
        <h2 style="font-family:'Bangers'">RECORD SIN</h2>
        <input type="text" id="targetName" placeholder="TARGET NAME" class="admin-input">
        <textarea id="sinDesc" placeholder="THE SIN" class="admin-input" rows="3"></textarea>
        <textarea id="vDesc" placeholder="THE VENGEANCE" class="admin-input" rows="3"></textarea>
        <button class="gold-btn" onclick="window.publishV()">PUBLISH</button>
        <button onclick="window.toggleVEntry(false)" style="color:var(--gold); background:none; border:none; cursor:pointer; margin-left:10px;">CANCEL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentSib = null;
        let registry = {};

        // --- FEED & REGISTRY SYNC ---
        onValue(ref(db, 'middle_logs'), snap => {
            const feed = document.getElementById('feed-content'); feed.innerHTML = "";
            const logs = []; snap.forEach(c => { logs.push(c.val()); });
            logs.reverse().forEach(l => {
                feed.innerHTML += `<div class="feed-entry"><b>${l.user}, ${l.rank} of the Middle:</b> ${l.action} against <b>${l.target}</b>.</div>`;
            });
        });

        onValue(ref(db, 'middle_registry'), snap => {
            registry = snap.val() || {};
            renderRegistry();
        });

        function renderRegistry(filter = "") {
            const list = document.getElementById('registry-list'); list.innerHTML = "";
            Object.keys(registry).sort().forEach(name => {
                if (filter && !name.toLowerCase().includes(filter.toLowerCase())) return;
                const entry = document.createElement('div');
                entry.className = 'name-entry';
                entry.innerHTML = `<div class="name-header" onclick="window.toggleVSub('${name}')"><span>> ${name}</span></div>
                                   <div id="sub-${name.replace(/\s/g,'')}" class="v-sublist"></div>`;
                list.appendChild(entry);
                const sub = entry.querySelector('.v-sublist');
                Object.keys(registry[name]).forEach(vId => {
                    const v = registry[name][vId];
                    sub.innerHTML += `<div style="margin-bottom:15px; border-left:3px solid var(--gold); padding-left:15px;">
                        <div style="color:#ff6b6b; font-weight:bold;">SIN: ${v.sin}</div>
                        <div style="color:white;">VENGEANCE: ${v.action}</div>
                        <button onclick="window.completeV('${name}','${vId}')" class="gold-btn" style="font-size:0.7rem; padding:5px; margin-top:10px;">COMPLETED VENGEANCE</button>
                    </div>`;
                });
            });
        }

        // --- ADMIN & AUTH ---
        window.login = async () => {
            const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
            const snap = await get(ref(db, `middle_users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                currentSib = snap.val(); currentSib.username = u;
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                document.getElementById('sib-welcome').innerText = `${currentSib.display_name}, ${currentSib.rank}`;
                document.getElementById('auth-toggle-btn').innerText = "COLLAPSE INFO";
                if(currentSib.rank.toLowerCase().includes("great")) {
                    document.getElementById('great-tools').style.display = 'block';
                    loadSiblings();
                }
            } else alert("Invalid Sibling Credentials.");
        };

        function loadSiblings() {
            onValue(ref(db, 'middle_users'), snap => {
                const body = document.getElementById('sib-table-body'); body.innerHTML = "";
                snap.forEach(child => {
                    const u = child.key; const d = child.val();
                    body.innerHTML += `<tr>
                        <td><input type="text" id="ed-d-${u}" value="${d.display_name}" style="width:80px"></td>
                        <td>${u}</td>
                        <td><input type="text" id="ed-p-${u}" value="${d.password}" style="width:80px"></td>
                        <td><input type="text" id="ed-r-${u}" value="${d.rank}" style="width:80px"></td>
                        <td><button onclick="window.saveSib('${u}')">SAVE</button></td>
                    </tr>`;
                });
            });
        }

        window.registerSib = async () => {
            const d = document.getElementById('regD').value, u = document.getElementById('regU').value, p = document.getElementById('regP').value, r = document.getElementById('regR').value;
            if(!u || !p) return;
            await set(ref(db, `middle_users/${u}`), { display_name: d, password: p, rank: r });
            alert("Sibling Registered.");
        };

        window.saveSib = async (u) => {
            const d = document.getElementById(`ed-d-${u}`).value, p = document.getElementById(`ed-p-${u}`).value, r = document.getElementById(`ed-r-${u}`).value;
            await set(ref(db, `middle_users/${u}`), { display_name: d, password: p, rank: r });
            alert("Updated.");
        };

        window.handleAuthToggle = () => {
            const m = document.getElementById('auth-modal');
            const btn = document.getElementById('auth-toggle-btn');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            
            if(currentSib) {
                btn.innerText = (m.style.display === 'block') ? "COLLAPSE INFO" : "EXPAND INFO";
            }
        };

        // --- VENGEANCE ACTIONS ---
        window.publishV = async () => {
            const t = document.getElementById('targetName').value.trim(), s = document.getElementById('sinDesc').value.trim(), v = document.getElementById('vDesc').value.trim();
            if(!t || !s || !v) return;
            await push(ref(db, `middle_registry/${t}`), { sin: s, action: v });
            await push(ref(db, 'middle_logs'), { user: currentSib?currentSib.display_name:"Anonymous", rank: currentSib?currentSib.rank:"Stranger", action: "Added a vengeance", target: t });
            window.toggleVEntry(false);
        };

        window.completeV = async (name, vId) => {
            await remove(ref(db, `middle_registry/${name}/${vId}`));
            const check = await get(ref(db, `middle_registry/${name}`));
            if(!check.exists()) await remove(ref(db, `middle_registry/${name}`));
            await push(ref(db, 'middle_logs'), { user: currentSib?currentSib.display_name:"Anonymous", rank: currentSib?currentSib.rank:"Stranger", action: "Completed a vengeance", target: name });
        };

        window.toggleVSub = (n) => { const s = document.getElementById(`sub-${n.replace(/\s/g,'')}`); s.style.display = s.style.display === 'block' ? 'none' : 'block'; };
        window.toggleVEntry = (s) => document.getElementById('v-entry-modal').style.display = s ? 'block' : 'none';
        window.filterNames = () => renderRegistry(document.getElementById('searchBar').value);
        window.logout = () => location.reload();
    </script>
</body>
</html>
