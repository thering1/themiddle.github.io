<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Project A: The Middle (Vengeance Registry & Logs)
        const middleConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // Project B: Shared Accounts (The Sibling Directory)
        const accountConfig = {
            apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
            authDomain: "account-data-54450.firebaseapp.com",
            databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "account-data-54450"
        };

        const middleApp = initializeApp(middleConfig, "middleApp");
        const accountApp = initializeApp(accountConfig, "accountApp");

        const db = getDatabase(middleApp);      // For Registry/Logs
        const userDb = getDatabase(accountApp); // For Sibling Accounts
        
        let currentSib = null;
        let registry = {};

        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str || "";
            return div.innerHTML;
        };

        // --- AUTH LOGIC (Points to account-data-54450) ---
        const login = async () => {
            const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
            // Hierarchy: users > username
            const snap = await get(ref(userDb, `users/${u}`));
            
            if(snap.exists() && snap.val().password === p) {
                currentSib = snap.val(); 
                currentSib.username = u;
                
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                
                // Format: Name, Rank of the Finger
                const welcomeName = `${sanitize(currentSib.display_name)}, ${sanitize(currentSib.rank)} of the ${sanitize(currentSib.finger || "Void")}`;
                document.getElementById('sib-welcome').innerText = welcomeName;
                document.getElementById('auth-toggle-btn').innerText = "COLLAPSE INFO";
                
                if(currentSib.rank.toLowerCase().includes("great") || currentSib.rank.toLowerCase().includes("lord")) {
                    document.getElementById('great-tools').style.display = 'block';
                    loadSiblings();
                }
            } else alert("Access Denied.");
        };

        // --- SIBLING MANAGEMENT (Lord Only - Points to Account DB) ---
        function loadSiblings() {
            onValue(ref(userDb, 'users'), snap => {
                const body = document.getElementById('sib-table-body'); body.innerHTML = "";
                snap.forEach(child => {
                    const u = child.key; const d = child.val();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><input type="text" id="ed-d-${u}" value="${sanitize(d.display_name)}" style="width:70px"></td>
                        <td>${sanitize(u)}</td>
                        <td><input type="text" id="ed-p-${u}" value="${sanitize(d.password)}" style="width:70px"></td>
                        <td><input type="text" id="ed-r-${u}" value="${sanitize(d.rank)}" style="width:70px"></td>
                        <td><input type="text" id="ed-f-${u}" value="${sanitize(d.finger || '')}" style="width:70px"></td>`;
                    
                    const actionTd = document.createElement('td');
                    const saveBtn = document.createElement('button');
                    saveBtn.textContent = "SAVE"; saveBtn.style.fontSize = "0.6rem";
                    saveBtn.onclick = () => saveSib(u);
                    
                    const delBtn = document.createElement('button');
                    delBtn.textContent = "X"; delBtn.style.cssText = "font-size:0.6rem; color:red; margin-left:5px;";
                    delBtn.onclick = () => { if(confirm("Exile Sibling?")) remove(ref(userDb, `users/${u}`)); };

                    actionTd.appendChild(saveBtn);
                    actionTd.appendChild(delBtn);
                    row.appendChild(actionTd);
                    body.appendChild(row);
                });
            });
        }

        const saveSib = async (u) => {
            const d = document.getElementById(`ed-d-${u}`).value;
            const p = document.getElementById(`ed-p-${u}`).value;
            const r = document.getElementById(`ed-r-${u}`).value;
            const f = document.getElementById(`ed-f-${u}`).value;
            await set(ref(userDb, `users/${u}`), { display_name: d, password: p, rank: r, finger: f });
            alert("Record Updated.");
        };

        document.getElementById('regSibBtn').onclick = async () => {
            const d = document.getElementById('regD').value, 
                  u = document.getElementById('regU').value, 
                  p = document.getElementById('regP').value, 
                  r = document.getElementById('regR').value,
                  f = "Void"; // Default finger for new recruits
            if(!u || !p) return;
            await set(ref(userDb, `users/${u}`), { display_name: d, password: p, rank: r, finger: f });
            alert("Registered in Global Account DB.");
        };

        // --- REGISTRY & LOGS (Points to Middle/Ring Data DB) ---
        onValue(ref(db, 'middle_logs'), snap => {
            const feed = document.getElementById('feed-content'); feed.innerHTML = "";
            const logs = []; snap.forEach(c => { logs.push(c.val()); });
            logs.reverse().forEach(l => {
                const entry = document.createElement('div');
                entry.className = 'feed-entry';
                // Logs now show the full title: Name, Rank of the Finger
                const logHeader = l.finger ? `${sanitize(l.user)}, ${sanitize(l.rank)} of the ${sanitize(l.finger)}` : `${sanitize(l.user)}, ${sanitize(l.rank)}`;
                entry.innerHTML = `<b>${logHeader}:</b> ${sanitize(l.action)} against <b>${sanitize(l.target)}</b>.`;
                feed.appendChild(entry);
            });
        });

        const publishV = async () => {
            const t = document.getElementById('targetName').value.trim(), s = document.getElementById('sinDesc').value.trim(), v = document.getElementById('vDesc').value.trim();
            if(!t || !s || !v) return;
            await push(ref(db, `middle_registry/${t}`), { sin: s, action: v });
            await push(ref(db, 'middle_logs'), { 
                user: currentSib ? currentSib.display_name : "Anonymous", 
                rank: currentSib ? currentSib.rank : "Stranger", 
                finger: currentSib ? currentSib.finger : "Void",
                action: "Recorded a sin", 
                target: t 
            });
            toggleVEntry(false);
            document.getElementById('targetName').value = ""; document.getElementById('sinDesc').value = ""; document.getElementById('vDesc').value = "";
        };

        // ... [Include the rest of your video and UI functions here] ...
        // Ensure you keep your existing toggleAuth, toggleVEntry, filterNames, and completeV functions.
        
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('logoutBtn').onclick = () => location.reload();
        // ... [Rest of Event Listeners]
    </script>
