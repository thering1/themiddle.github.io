<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Middle</title>
    <style>
        :root {
            --deep-purple: #2e004f;
            --gold: #ffd700;
            --soft-white: #f4f4f4;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Garamond', serif; 
            background: var(--deep-purple); 
            color: var(--gold);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* Header & Bottom Banner */
        .banner { 
            background: var(--deep-purple); 
            padding: 20px; text-align: center; 
            border-bottom: 4px solid var(--gold);
            z-index: 100;
        }
        .footer {
            background: var(--deep-purple);
            padding: 15px; border-top: 4px solid var(--gold);
            display: flex; justify-content: center; gap: 20px;
        }

        h1 { margin: 0; font-size: 3rem; letter-spacing: 8px; text-transform: uppercase; }
        .gold-line { width: 85%; height: 2px; background: var(--gold); margin: 10px auto; }

        /* Search & Action Bar */
        .search-container { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #searchBar { 
            width: 60%; padding: 12px; 
            background: transparent; border: 2px solid var(--gold); 
            color: var(--gold); font-size: 1.2rem; outline: none;
        }
        #searchBar::placeholder { color: rgba(255, 215, 0, 0.5); }

        /* Main List */
        #registry-list { 
            flex-grow: 1; overflow-y: auto; 
            padding: 20px 10%; scroll-behavior: smooth;
        }

        .name-entry { 
            border: 1px solid var(--gold); margin-bottom: 10px; 
            cursor: pointer; transition: 0.3s;
        }
        .name-header { 
            padding: 15px; font-size: 1.5rem; font-weight: bold; 
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.2);
        }
        .name-header:hover { background: rgba(255, 215, 0, 0.1); }

        .vengeance-sublist { 
            display: none; padding: 0 20px 20px 20px; 
            background: rgba(255, 255, 255, 0.05);
        }
        .vengeance-item { 
            border-left: 3px solid var(--gold); padding: 15px; margin-top: 15px;
            background: rgba(0,0,0,0.3);
        }
        .sin-text { color: #ff6347; font-style: italic; margin-bottom: 5px; }
        .v-text { color: var(--soft-white); font-size: 1.1rem; }

        /* Buttons */
        .gold-btn { 
            background: var(--gold); color: var(--deep-purple); 
            border: none; padding: 10px 25px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase;
        }
        .complete-btn { 
            margin-top: 10px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); 
            font-size: 0.7rem; padding: 5px; cursor: pointer;
        }
        .complete-btn:hover { background: var(--gold); color: var(--deep-purple); }

        /* Modal */
        #modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: var(--deep-purple); border: 3px solid var(--gold); 
            padding: 30px; width: 400px; display: flex; flex-direction: column; gap: 15px;
        }
        .modal-content input, .modal-content textarea {
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); padding: 10px; outline: none;
        }
        #autofill-suggestions { max-height: 80px; overflow-y: auto; font-size: 0.8rem; cursor: pointer; }

    </style>
</head>
<body>

    <div class="banner">
        <h1>The Middle</h1>
        <div class="gold-line"></div>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="SEARCH FOR A NAME..." oninput="window.filterNames()">
        <button class="gold-btn" onclick="window.toggleModal(true)">+ NEW VENGEANCE</button>
    </div>

    <div id="registry-list">
        </div>

    <div class="footer">
        <div class="gold-line"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2 style="margin:0">RECORD SIN</h2>
            <input type="text" id="vName" placeholder="TARGET NAME" oninput="window.showSuggestions()">
            <div id="autofill-suggestions"></div>
            <textarea id="vSin" placeholder="SIN COMMITTED" rows="3"></textarea>
            <textarea id="vAction" placeholder="VENGEANCE REQUIRED" rows="3"></textarea>
            <button class="gold-btn" onclick="window.publishVengeance()">PUBLISH VENGEANCE</button>
            <button style="background:none; border:none; color:var(--gold); cursor:pointer; text-decoration:underline;" onclick="window.toggleModal(false)">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allData = {};

        // --- DATA SYNC ---
        onValue(ref(db, 'registry'), (snap) => {
            allData = snap.val() || {};
            renderList();
        });

        function renderList(filter = "") {
            const list = document.getElementById('registry-list');
            list.innerHTML = "";
            
            // Sort names alphabetically
            const sortedNames = Object.keys(allData).sort();

            sortedNames.forEach(name => {
                if (filter && !name.toLowerCase().includes(filter.toLowerCase())) return;

                const entry = document.createElement('div');
                entry.className = 'name-entry';
                
                const vengeances = allData[name];
                const vCount = Object.keys(vengeances).length;

                entry.innerHTML = `
                    <div class="name-header" onclick="window.toggleVengeances('${name}')">
                        <span>> ${name}</span>
                        <span style="font-size:0.9rem; opacity:0.7;">[${vCount} OPEN]</span>
                    </div>
                    <div id="vlist-${name.replace(/\s/g, '')}" class="vengeance-sublist"></div>
                `;
                
                list.appendChild(entry);
                
                // Build the sublist
                const sublist = entry.querySelector('.vengeance-sublist');
                Object.keys(vengeances).forEach(vId => {
                    const v = vengeances[vId];
                    const vItem = document.createElement('div');
                    vItem.className = 'vengeance-item';
                    vItem.innerHTML = `
                        <div class="sin-text">COMMITTED: ${v.sin}</div>
                        <div class="v-text">VENGEANCE: ${v.vengeance}</div>
                        <button class="complete-btn" onclick="window.completeVengeance('${name}', '${vId}')">COMPLETED VENGEANCE</button>
                    `;
                    sublist.appendChild(vItem);
                });
            });
        }

        // --- UI FUNCTIONS ---
        window.filterNames = () => {
            renderList(document.getElementById('searchBar').value);
        };

        window.toggleVengeances = (name) => {
            const el = document.getElementById(`vlist-${name.replace(/\s/g, '')}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        };

        window.toggleModal = (show) => {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        };

        window.showSuggestions = () => {
            const val = document.getElementById('vName').value.toLowerCase();
            const sugg = document.getElementById('autofill-suggestions');
            sugg.innerHTML = "";
            if (!val) return;

            Object.keys(allData).forEach(name => {
                if (name.toLowerCase().startsWith(val)) {
                    const d = document.createElement('div');
                    d.innerText = name;
                    d.onclick = () => { document.getElementById('vName').value = name; sugg.innerHTML = ""; };
                    sugg.appendChild(d);
                }
            });
        };

        window.publishVengeance = async () => {
            const name = document.getElementById('vName').value.trim();
            const sin = document.getElementById('vSin').value.trim();
            const v = document.getElementById('vAction').value.trim();

            if (!name || !sin || !v) return alert("Every sin requires a record.");

            const newRef = push(ref(db, `registry/${name}`));
            await set(newRef, { sin, vengeance: v, timestamp: Date.now() });

            window.toggleModal(false);
            document.getElementById('vName').value = "";
            document.getElementById('vSin').value = "";
            document.getElementById('vAction').value = "";
        };

        window.completeVengeance = async (name, vId) => {
            await remove(ref(db, `registry/${name}/${vId}`));
            // Check if name is empty
            const snap = await get(ref(db, `registry/${name}`));
            if (!snap.exists()) {
                await remove(ref(db, `registry/${name}`));
            }
        };
    </script>
</body>
</html>
