<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Middle</title>
    <link rel="icon" type="image/png" href="The_Ring_Icon.png">
    <style>
        :root { --gold: #ffd700; --dark-bg: #0a0a0a; --panel-bg: #1a1a1a; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #000; padding: 20px; border-bottom: 3px solid var(--gold); text-align: center; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Registry & Logs */
        .panel { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        .registry-entry { background: var(--panel-bg); border-left: 4px solid var(--gold); padding: 15px; margin-bottom: 15px; }
        
        /* Admin Modal */
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--gold); padding: 25px; z-index: 1000; width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .input-box { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 8px; margin: 5px; font-family: inherit; }
        .gold-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        
        #auth-btn { position: fixed; bottom: 20px; right: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--gold); letter-spacing: 10px; margin:0;">THE MIDDLE</h1>
    </div>

    <div class="main-layout">
        <div class="panel" id="registry-panel">
            <h2 style="color:var(--gold);">REGISTRY</h2>
            <div id="registry-list"></div>
        </div>
        <div class="panel" id="logs-panel">
            <h2 style="color:var(--gold);">ARCHIVE LOGS</h2>
            <div id="logs-list"></div>
        </div>
    </div>

    <button id="auth-btn" class="gold-btn">ACCESS TERMINAL</button>

    <div id="admin-modal">
        <div id="login-form">
            <h3 style="color:var(--gold);">IDENTIFY</h3>
            <input type="text" id="adminUser" placeholder="Username" class="input-box">
            <input type="password" id="adminPass" placeholder="Password" class="input-box">
            <button id="loginBtn" class="gold-btn">ENTER</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'" style="color:white; background:none; border:none; cursor:pointer;">Cancel</button>
        </div>

        <div id="admin-tools" style="display:none;">
            <div style="border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between;">
                <span id="user-welcome" style="color:var(--gold);"></span>
                <button id="logoutBtn" style="background:red; color:white; border:none; cursor:pointer;">DISCONNECT</button>
            </div>

            <div id="lord-only" style="display:none;">
                <h4 style="color:var(--gold);">SIBLING MANAGEMENT (ACCOUNT DB)</h4>
                <div style="border: 1px dashed var(--gold); padding: 10px; margin-bottom: 20px;">
                    <input type="text" id="regDisp" placeholder="Display Name" class="input-box">
                    <input type="text" id="regUser" placeholder="Username" class="input-box">
                    <input type="text" id="regPass" placeholder="Password" class="input-box">
                    <input type="text" id="regRank" placeholder="Rank" class="input-box">
                    <input type="text" id="regFinger" placeholder="Finger" class="input-box">
                    <button id="createAccBtn" class="gold-btn" style="padding: 5px 10px;">ADD SIBLING</button>
                </div>
                <table>
                    <thead><tr><th>Name</th><th>User</th><th>Rank</th><th>Finger</th><th>Action</th></tr></thead>
                    <tbody id="acc-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Project A: The Middle (Registry/Logs)
        const middleConfig = {
            apiKey: "AIzaSyCcjwKFOaKas5SCxoZg1Tgb6G58YCpmmTc",
            authDomain: "ring-data-789e9.firebaseapp.com",
            databaseURL: "https://ring-data-789e9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "ring-data-789e9"
        };

        // Project B: Accounts
        const accountConfig = {
            apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
            authDomain: "account-data-54450.firebaseapp.com",
            databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "account-data-54450"
        };

        const middleApp = initializeApp(middleConfig, "middleApp");
        const accountApp = initializeApp(accountConfig, "accountApp");

        const db = getDatabase(middleApp);
        const userDb = getDatabase(accountApp);

        let currentUser = null;

        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str || "";
            return div.innerHTML;
        };

        // --- AUTH LOGIC (Users > Username) ---
        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const snap = await get(ref(userDb, `users/${u}`));

            if (snap.exists() && snap.val().password === p) {
                currentUser = snap.val();
                currentUser.username = u;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('user-welcome').innerText = `${currentUser.display_name}, ${currentUser.rank} of the ${currentUser.finger}`;
                
                if (currentUser.rank === 'Lord') {
                    document.getElementById('lord-only').style.display = 'block';
                    loadUserDirectory();
                }
            } else alert("Invalid Credentials.");
        };

        function loadUserDirectory() {
            onValue(ref(userDb, 'users'), snap => {
                const body = document.getElementById('acc-body'); body.innerHTML = '';
                snap.forEach(child => {
                    const u = child.key; const d = child.val();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${sanitize(d.display_name)}</td>
                        <td>${sanitize(u)}</td>
                        <td>${sanitize(d.rank)}</td>
                        <td>${sanitize(d.finger)}</td>
                        <td><button onclick="window.removeSibling('${u}')" style="color:red; background:none; border:none; cursor:pointer;">[X]</button></td>
                    `;
                    body.appendChild(row);
                });
            });
        }

        window.removeSibling = (u) => { if(confirm("Sever connection?")) remove(ref(userDb, `users/${u}`)); };

        document.getElementById('createAccBtn').onclick = async () => {
            const u = document.getElementById('regUser').value;
            const d = document.getElementById('regDisp').value;
            const p = document.getElementById('regPass').value;
            const r = document.getElementById('regRank').value;
            const f = document.getElementById('regFinger').value;
            if(!u || !p) return;
            await set(ref(userDb, `users/${u}`), { display_name: d, password: p, rank: r, finger: f });
            alert("Sibling added to Account DB.");
        };

        // --- REGISTRY DISPLAY ---
        onValue(ref(db, 'registry'), snap => {
            const list = document.getElementById('registry-list'); list.innerHTML = '';
            snap.forEach(child => {
                const div = document.createElement('div');
                div.className = 'registry-entry';
                div.innerHTML = `<strong>${sanitize(child.key)}</strong>`;
                list.appendChild(div);
            });
        });

        // UI Handlers
        document.getElementById('auth-btn').onclick = () => document.getElementById('admin-modal').style.display = 'block';
        document.getElementById('logoutBtn').onclick = () => location.reload();

    </script>
</body>
</html>
