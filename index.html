<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Middle</title>
    <link rel="icon" type="image/png" href="thethumb.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --banner-purple: #2e004f;
            --void-purple: #1a002e; 
            --gold: #ffd700;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--void-purple); 
            color: var(--gold);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* Global Video Background Container */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Layered behind all UI */
            background: var(--void-purple);
            overflow: hidden;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures video fills screen edges */
            opacity: 0.45; /* Balanced for atmosphere and legibility */
        }

        /* UI Structure */
        .banner { 
            background: var(--banner-purple); 
            padding: 20px; text-align: center; 
            border-bottom: 5px solid var(--gold);
            z-index: 100;
            position: relative;
        }

        h1 { 
            margin: 0; font-family: 'Bangers', cursive; 
            font-size: 4.5rem; letter-spacing: 3px; 
            text-transform: uppercase; text-shadow: 3px 3px 0px #000;
        }

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        #live-feed {
            width: 320px;
            background: rgba(46, 0, 79, 0.9); /* Higher opacity for sidebar readability */
            border-right: 2px solid var(--gold);
            padding: 15px;
            overflow-y: auto;
            z-index: 10;
        }

        .registry-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        #registry-list { 
            flex-grow: 1; overflow-y: auto; 
            padding: 20px 5%; z-index: 5; 
        }

        .search-area { padding: 20px; text-align: center; z-index: 5; }
        
        #searchBar { 
            width: 60%; padding: 12px; background: rgba(0,0,0,0.85); 
            border: 2px solid var(--gold); color: var(--gold); 
            font-size: 1.3rem; font-family: 'Bangers', cursive;
        }

        /* Buttons & Components */
        .gold-btn { background: var(--gold); color: var(--banner-purple); border: none; padding: 10px 25px; cursor: pointer; font-family: 'Bangers', cursive; font-size: 1.2rem; }
        .nav-btn { position: fixed; bottom: 20px; padding: 10px 20px; border: 2px solid var(--gold); background: var(--banner-purple); color: var(--gold); font-family: 'Bangers'; z-index: 2000; text-decoration: none; font-size: 0.9rem; }
        
        .name-entry { border: 1px solid var(--gold); margin-bottom: 10px; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="bg-video" autoplay muted playsinline></video>
    </div>

    <div class="banner">
        <h1>The Middle</h1>
    </div>

    <div class="main-layout">
        <div id="live-feed">
            <div style="font-family: 'Bangers'; font-size: 1.8rem; text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 15px;">AUDIT LOG</div>
            <div id="feed-content"></div>
        </div>

        <div class="registry-container">
            <div class="search-area">
                <input type="text" id="searchBar" placeholder="SEARCH REGISTRY..." oninput="window.filterNames()">
                <button class="gold-btn" onclick="window.toggleVEntry(true)">+ NEW VENGEANCE</button>
            </div>
            <div id="registry-list"></div>
        </div>
    </div>

    <a href="https://thering1.github.io/thering.github.io/" style="left:20px;" class="nav-btn">THE RING</a>
    <button id="auth-toggle-btn" style="right:20px;" class="nav-btn" onclick="window.handleAuthToggle()">SIGN IN</button>

    <script>
        const videoElement = document.getElementById('bg-video');
        
        function shuffleBackground() {
            // Randomly selects a number between 1 and 6
            const randomIndex = Math.floor(Math.random() * 6) + 1;
            const videoPath = `middle compilation (${randomIndex}).mp4`;
            
            videoElement.src = videoPath;
            videoElement.load();
            videoElement.play().catch(err => {
                console.log("Awaiting user interaction for autoplay.");
            });
        }

        // Initialize the cycle
        shuffleBackground();

        // Listen for the end of the current clip to play the next random one
        videoElement.addEventListener('ended', shuffleBackground);
    </script>

    </body>
</html>
